name: Build Signed Release AAB

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build & Sign AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ENV_ABX_SERVER

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify signing secrets are present
        shell: bash
        run: |
          missing=0
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] && echo "::error::KEYSTORE_BASE64 secret is not set" && missing=1
          [ -z "${{ secrets.STORE_PASSWORD }}" ] && echo "::error::STORE_PASSWORD secret is not set" && missing=1
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && echo "::error::KEY_PASSWORD secret is not set" && missing=1
          if [ "$missing" = "1" ]; then
            echo "::error::One or more release signing secrets are missing."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Decode keystore
        shell: bash
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-key.jks

      - name: Verify decoded keystore
        shell: bash
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          keytool -list -keystore upload-key.jks -storepass "$STORE_PASSWORD" -alias upload || {
            echo "::error::Unable to open keystore using alias 'upload'."
            rm -f upload-key.jks
            exit 1
          }

      - name: Build signed release AAB
        shell: bash
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:bundleRelease

      - name: Verify AAB exists
        shell: bash
        run: |
          AAB="app/build/outputs/bundle/release/app-release.aab"
          if [[ ! -f "$AAB" ]]; then
            echo "::error::Expected release AAB not found at $AAB"
            exit 1
          fi
          echo "Release AAB built: $AAB ($(stat -c%s "$AAB") bytes)"

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: abx-server-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Clean up keystore
        if: always()
        shell: bash
        run: rm -f upload-key.jks

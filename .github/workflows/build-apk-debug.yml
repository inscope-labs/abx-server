name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Initialize build log & display build info
        shell: bash
        run: |
          mkdir -p build-logs/debug diagnostics/manifest diagnostics/apk diagnostics/reports
          LOGFILE="build-logs/debug/debug-$(date -u +%Y-%m-%dT%H-%M-%SZ)-run${{ github.run_id }}.log"
          echo "LOGFILE=$LOGFILE" >> "$GITHUB_ENV"
          VERSION_CODE=$(grep -m1 'versionCode' app/build.gradle.kts | grep -oE '[0-9]+')
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle.kts | grep -oE '"[^"]+"' | tr -d '"')
          {
            echo "===== BUILD INFO ====="
            echo "Run ID:       ${{ github.run_id }}"
            echo "Commit SHA:   ${{ github.sha }}"
            echo "Ref:          ${{ github.ref }}"
            echo "Triggered by: ${{ github.actor }}"
            echo "Timestamp:    $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "versionCode:  $VERSION_CODE"
            echo "versionName:  $VERSION_NAME"
            echo "======================="
            echo ""
          } | tee "$LOGFILE"

      - name: Android Lint
        continue-on-error: true
        shell: bash
        run: |
          gradle --no-daemon :app:lintDebug --stacktrace --warning-mode all 2>&1 | tee diagnostics/reports/lint.log

      - name: ktlint
        continue-on-error: true
        shell: bash
        run: |
          if find . -name "*.gradle*" | xargs grep -q ktlint; then
            gradle --no-daemon ktlintCheck --stacktrace 2>&1 | tee diagnostics/reports/ktlint.log || true
          else
            echo "ktlint not configured" | tee diagnostics/reports/ktlint.log
          fi

      - name: detekt
        continue-on-error: true
        shell: bash
        run: |
          if find . -name "*.gradle*" | xargs grep -q detekt; then
            gradle --no-daemon detekt --stacktrace 2>&1 | tee diagnostics/reports/detekt.log || true
          else
            echo "detekt not configured" | tee diagnostics/reports/detekt.log
          fi

      - name: Unit Tests
        continue-on-error: true
        shell: bash
        run: |
          gradle --no-daemon :app:testDebugUnitTest --stacktrace --warning-mode all 2>&1 | tee diagnostics/reports/unit-tests.log

      - name: Generate Dependency Report
        continue-on-error: true
        shell: bash
        run: |
          gradle --no-daemon :app:dependencies --configuration debugRuntimeClasspath > diagnostics/dependencies.txt

      - name: Build debug APK
        shell: bash
        run: |
          gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee -a "$LOGFILE"

      - name: Verify APK exists
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [[ ! -f "$APK" ]]; then
            echo "::error::Expected debug APK not found at $APK"
            exit 1
          fi
          echo "Debug APK built: $APK ($(stat -c%s "$APK") bytes)"

      - name: Collect Manifest Diagnostics
        continue-on-error: true
        shell: bash
        run: |
          find app/build -path "*merged_manifests*" -type f -exec cp {} diagnostics/manifest/ \;

      - name: Inspect APK Contents
        continue-on-error: true
        shell: bash
        run: |
          unzip -l app/build/outputs/apk/debug/app-debug.apk > diagnostics/apk/apk-contents.txt

      - name: Summarize warnings and errors
        shell: bash
        run: |
          {
            echo ""
            echo "===== WARNING/ERROR SUMMARY ====="
            grep -iE "warning:|error:|failed|exception" "$LOGFILE" || echo "None found."
          } >> "$LOGFILE"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: abx-server-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Diagnostics Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abx-server-debug-diagnostics
          path: |
            diagnostics/
          retention-days: 14

      - name: Commit build log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$LOGFILE"
          git commit -m "ci: add debug build log ($LOGFILE)" || echo "Nothing to commit"
          git push

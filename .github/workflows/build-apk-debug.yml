name: Build Debug APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Build debug APK
        shell: bash
        run: |
          mkdir -p build-logs/debug
          LOGFILE="build-logs/debug/debug-$(date -u +%Y-%m-%dT%H-%M-%SZ)-run${{ github.run_id }}.log"
          echo "LOGFILE=$LOGFILE" >> "$GITHUB_ENV"
          gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee "$LOGFILE"

      - name: Verify APK exists
        shell: bash
        run: |
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [[ ! -f "$APK" ]]; then
            echo "::error::Expected debug APK not found at $APK"
            exit 1
          fi
          echo "Debug APK built: $APK ($(stat -c%s "$APK") bytes)"

      - name: Summarize warnings and errors
        shell: bash
        run: |
          {
            echo ""
            echo "===== WARNING/ERROR SUMMARY ====="
            grep -iE "warning:|error:|failed|exception" "$LOGFILE" || echo "None found."
          } >> "$LOGFILE"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: abx-server-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Commit build log
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$LOGFILE"
          git commit -m "ci: add debug build log ($LOGFILE)" || echo "Nothing to commit"
          git push

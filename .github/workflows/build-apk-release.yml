name: Build Signed Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ENV_ABX_SERVER

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Bump version
        shell: bash
        run: |
          CURRENT_CODE=$(grep -m1 'versionCode' version.properties | cut -d'=' -f2 | tr -d ' ')
          CURRENT_DEBUG=$(grep -m1 'versionDebug' version.properties | cut -d'=' -f2 | tr -d ' ')
          NEW_CODE=$((CURRENT_CODE + 1))
          NEW_DEBUG=$((CURRENT_DEBUG + 1))
          sed -i "s/^versionCode=.*/versionCode=$NEW_CODE/" version.properties
          sed -i "s/^versionDebug=.*/versionDebug=$NEW_DEBUG/" version.properties
          echo "NEW_VERSION_CODE=$NEW_CODE" >> "$GITHUB_ENV"
          echo "NEW_VERSION_DEBUG=$NEW_DEBUG" >> "$GITHUB_ENV"
          echo "Bumped versionCode -> $NEW_CODE, versionDebug -> $NEW_DEBUG"

      - name: Verify signing secrets are present
        shell: bash
        run: |
          missing=0
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] && echo "::error::KEYSTORE_BASE64 secret is not set" && missing=1
          [ -z "${{ secrets.STORE_PASSWORD }}" ] && echo "::error::STORE_PASSWORD secret is not set" && missing=1
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && echo "::error::KEY_PASSWORD secret is not set" && missing=1
          if [ "$missing" = "1" ]; then
            echo "::error::One or more release signing secrets are missing."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.6.1"

      - name: Decode keystore
        shell: bash
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > upload-key.jks

      - name: Verify decoded keystore
        shell: bash
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          keytool -list -keystore upload-key.jks -storepass "$STORE_PASSWORD" -alias upload || {
            echo "::error::Unable to open keystore using alias 'upload'."
            rm -f upload-key.jks
            exit 1
          }

      - name: Build signed release APK
        shell: bash
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:assembleRelease

      - name: Verify APK exists and signature is valid
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$APK" ]]; then
            echo "::error::Expected APK not found: $APK"
            exit 1
          fi
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          APKSIGNER=$(find "$SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n1)
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          echo "APK successfully built and signature verified."

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: abx-server-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.properties
          git commit -m "ci: bump versionCode to $NEW_VERSION_CODE (versionDebug $NEW_VERSION_DEBUG)" || echo "Nothing to commit"
          git pull --rebase origin main
          git push

      - name: Clean up keystore
        if: always()
        shell: bash
        run: rm -f upload-key.jks

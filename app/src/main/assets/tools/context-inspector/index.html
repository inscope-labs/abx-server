<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Context Inspector</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 16px; background: #FAFAFA; color: #2A2A2A; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #C7C7C7; border-radius: 8px; font-size: 14px; }
  button { margin-top: 8px; padding: 8px 14px; border: none; border-radius: 8px; background: #3D6FE0; color: white; font-size: 14px; }
  pre { background: #F2F2F2; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; white-space: pre-wrap; }
  .status { font-size: 12px; color: #8A8A8A; margin-top: 8px; }
</style>
</head>
<body>
  <h1>Context Inspector</h1>
  <input id="path" placeholder="/storage/emulated/0/Documents/notes.txt" />
  <button onclick="readFile()">Read file</button>
  <div class="status" id="status"></div>
  <pre id="output"></pre>

  <script>
    let pending = {};

    // nativeBridge is injected by JsBridgeManager (addWebMessageListener,
    // object name "nativeBridge"). Every call gets a requestId so replies
    // can be matched even if requests overlap.
    function callNative(action, payload) {
      return new Promise((resolve, reject) => {
        const requestId = 'req_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        pending[requestId] = { resolve, reject };
        nativeBridge.postMessage(JSON.stringify({ action, requestId, payload }));
      });
    }

    // Replies arrive as ordinary postMessage events on window.
    window.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch (e) { return; }
      const entry = pending[msg.requestId];
      if (!entry) return;
      delete pending[msg.requestId];
      if (msg.success) entry.resolve(msg.data);
      else entry.reject(new Error(msg.error || 'Unknown error'));
    });

    async function readFile() {
      const path = document.getElementById('path').value.trim();
      const status = document.getElementById('status');
      const output = document.getElementById('output');
      output.textContent = '';
      status.textContent = 'Reading...';
      try {
        const result = await callNative('mcp_call', {
          method: 'read_file',
          params: { path, encoding: 'text' }
        });
        status.textContent = 'OK';
        output.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
